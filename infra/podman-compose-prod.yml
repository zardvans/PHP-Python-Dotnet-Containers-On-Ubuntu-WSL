version: "3.9"

services:
  php:
    build:
      context: ..
      dockerfile: infra/php/Dockerfile
    container_name: php
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "/var/www/html/health.php"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8000:80"
    depends_on:
      - php
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 10s
      timeout: 5s
      retries: 3

  python:
    build:
      context: ..
      dockerfile: infra/python/Dockerfile
    container_name: python
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  dotnet:
    build:
      context: ..
      dockerfile: infra/dotnet/Dockerfile
    container_name: dotnet
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
    ports:
      - "3306:3306"
    networks:
      - appnet

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - appnet

networks:
  appnet: